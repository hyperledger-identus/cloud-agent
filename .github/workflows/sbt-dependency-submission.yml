# See https://github.com/marketplace/actions/sbt-dependency-submission
name: Update Dependency Graph
on:
  # push:
  #   branches:
  #     - master # default branch of the project
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

# Permission can be added at job level or workflow level
permissions:
  contents: read

jobs:
  dependency-graph:
    name: Update Dependency Graph
    runs-on: ubuntu-latest # or windows-latest, or macOS-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Java and Scala
        uses: olafurpg/setup-scala@32ffa16635ff8f19cc21ea253a987f0fdf29844c # v14
        with:
          java-version: adopt@1.11
      - name: Setup Node
        uses: actions/setup-node@d02c89dce7e1ba9ef629ce0680989b3a1cc72edb # v3.9.1
        with:
          node-version: "18" # or whatever
      # - name: Setup Scala.JS
      #   uses: japgolly/setup-scalajs@v1
      - name: Cache sbt
        uses: coursier/cache-action@288585e12960315492c10d496fafb65b57d9a89b # v6.3.3
      # - name: npm install
      #   run: npm install
      - uses: scalacenter/sbt-dependency-submission@f43202114d7522a4b233e052f82c2eea8d658134 # v3.2.1
        with:
          working-directory: ./
          modules-ignore:
            root_3
            shared-test
            polluxanoncredstest_3
            # predef_3
            # mercury-agent-didcommx_3
            # identus-cloud-agent_3
            # mercury-protocol-coordinate-mediation_3
            # pollux-sql-doobie_3
            # mercury-protocol-outofband-login_3
            # connect-sql-doobie_3
            # shared
            # pollux-core_3
            # pollux-sd-jwt_3
            # shared-json
            # pollux-vc-jwt_3
            # mercury-agent-core_3
            # mercury-protocol-connection_3
            # mercury-protocol-present-proof_3
            # castor-core_3
            # connect-core_3
            # mercury-protocol-trust-ping_3
            # shared-crypto
            # mercury-protocol-report-problem_3
            # pollux-prex_3
            # mercury-data-models_3
            # mercury-resolver_3
            # mercury-protocol-issue-credential_3
            # pollux-anoncreds_3
            # mercury-protocol-routing-2-0_3
            # mercury-verifiable-credentials_3
            # mercury-protocol-did-exchange_3
            # mercury-protocol-revocation-notification_3
            # mercury-protocol-invitation_3
            # event-notification_3
            # prism-node-client_3
            # cloud-agent-wallet-api_3
          configs-ignore: test scala-tool scala-doc-tool
