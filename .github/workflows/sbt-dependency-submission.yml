# See https://github.com/marketplace/actions/sbt-dependency-submission
name: Update Dependency Graph
on:
  # push:
  #   branches:
  #     - master # default branch of the project
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

# Permission can be added at job level or workflow level
permissions:
  contents: read

jobs:
  dependency-graph:
    name: Update Dependency Graph
    runs-on: ubuntu-latest # or windows-latest, or macOS-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Java and Scala
        uses: olafurpg/setup-scala@32ffa16635ff8f19cc21ea253a987f0fdf29844c # v14
        with:
          java-version: adopt@1.11
      - name: Setup Node
        uses: actions/setup-node@774c1d62961e73038a114d59c8847023c003194d # v3.9.1
        with:
          node-version: "18" # or whatever
      # - name: Setup Scala.JS
      #   uses: japgolly/setup-scalajs@v1
      - name: Cache sbt
        uses: coursier/cache-action@e47d7d35a0d3a2c7f649ca5c63dfc2bbfaa002e7 # v8.0.1
      # - name: npm install
      #   run: npm install
      - uses: scalacenter/sbt-dependency-submission@f43202114d7522a4b233e052f82c2eea8d658134 # v3.2.1
        with:
          working-directory: ./
          modules-ignore:
            root_3
            shared-test
            credentialsanoncredstest_3
          configs-ignore: test scala-tool scala-doc-tool
