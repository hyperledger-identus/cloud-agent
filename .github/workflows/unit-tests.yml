name: Unit tests

# Cancel previously running workflows if new commit pushed to the branch
# this will help to push fixes earlier and stop previous workflows
concurrency:
  group: ${{ github.head_ref }}${{ github.ref }}-unit-tests
  cancel-in-progress: true

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  build-and-unit-tests:
    name: "Build and unit tests"
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, '[skip ci]') }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SBT_OPTS: -Xmx2G
      DOCKER_API_VERSION: "1.44"
      TESTCONTAINERS_RYUK_DISABLED: true
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Git checkout (merge)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0

      - name: Git checkout (PR)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          # see: https://frontside.com/blog/2020-05-26-github-actions-pull_request/#how-does-pull_request-affect-actionscheckout
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 21 (Temurin) with sbt cache
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.2.0 pinned
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.1.18 pinned

      - name: Download dependencies
        run: sbt +update

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Run unit tests
        env:
          HOME: /root
        run: |
          sbt -v coverage test coverageAggregate

      - name: Upload coverage to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: sbt coveralls

      - name: Aggregate test reports
        if: always()
        uses: ./.github/actions/aggregate-test-reports

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        with:
          junit_files: "./target/test-reports/**/TEST-*.xml"
          comment_title: "Unit Test Results"
          check_name: "Unit Test Results"
