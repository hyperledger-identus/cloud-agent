name: Unit tests

# Cancel previously running workflows if new commit pushed to the branch
# this will help to push fixes earlier and stop previous workflows
concurrency:
  group: ${{ github.head_ref }}${{ github.ref }}-unit-tests
  cancel-in-progress: true

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  build-and-unit-tests:
    name: "Build and unit tests"
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.title, '[skip ci]') }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      COURSIER_CHECKSUMS: "none" # JitPack serves stale .sha1 for java-multibase
      SBT_OPTS: -Xmx2G
      DOCKER_API_VERSION: "1.44"
      TESTCONTAINERS_RYUK_DISABLED: true
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Git checkout (merge)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.event_name != 'pull_request'
        with:
          fetch-depth: 0

      - name: Git checkout (PR)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.event_name == 'pull_request'
        with:
          fetch-depth: 0
          # see: https://frontside.com/blog/2020-05-26-github-actions-pull_request/#how-does-pull_request-affect-actionscheckout
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 21 (Temurin) with sbt cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0 pinned
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.18 pinned

      - name: Download dependencies
        run: sbt +update

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Run unit tests
        env:
          HOME: /root
        run: |
          sbt -v coverage test coverageAggregate

      - name: Upload coverage to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: sbt coveralls

      - name: Aggregate test reports
        if: always()
        uses: ./.github/actions/aggregate-test-reports

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          junit_files: "./target/test-reports/**/TEST-*.xml"
          comment_title: "Unit Test Results"
          check_name: "Unit Test Results"
