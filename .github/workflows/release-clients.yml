name: Publish Identus-cloud-agent clients

run-name: Build and publish Identus Cloud Agent clients from from ${{ github.head_ref || github.ref_name }} run ${{ github.run_number }}

on:
  workflow_call:
    inputs:
      release:
        description: "Release to build and publish clients"
        required: true
        type: boolean
        default: false
      revision:
        description: "Revision to build and publish clients"
        required: true
        type: string
      check_sum:
        description: "Checksum of the OAS specification"
        required: false
        type: string
    secrets:
      HYP_BOT_GPG_PRIVATE:
        required: true
      HYP_BOT_GPG_PASSWORD:
        required: true
      OSSRH_USERNAME:
        required: true
      OSSRH_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      release:
        description: 'Is a release publication?'
        required: true
        type: boolean
        default: false
      revision:
        description: "Revision to build and publish clients"
        required: true
        type: string
      kotlin:
        description: 'Publish kotlin client'
        required: false
        type: boolean
        default: false
      ts:
        description: 'Publish ts client'
        required: false
        type: boolean
        default: false
      check_sum:
        description: "Checksum of the OAS specification"
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-clients:
    name: "Build and publish Identus Cloud Agent clients"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    env:
      GITHUB_ACTOR: "hyperledger-bot"
      GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.4.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          scope: "@hyperledger"

      # Ensure npm version ≥ 11.5.1 for Trusted Publishing
      - name: Upgrade npm
        run: npm install -g npm@^11.5.1

      - name: Setup Gradle
        uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0

      - name: Download release OAS
        if: ${{ inputs.release }}
        env:
          REVISION: ${{ inputs.revision }}
        run: |
          curl -fSL "https://raw.githubusercontent.com/hyperledger-identus/cloud-agent/refs/tags/v${REVISION}/cloud-agent/service/api/http/cloud-agent-openapi-spec.yaml" \
            -o ./cloud-agent/service/api/http/cloud-agent-openapi-spec.yaml

      - name: Download OpenAPI specification
        if: ${{ !inputs.releaseTag }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloud-agent-openapi-spec-${{ inputs.check_sum }}
          path: ./cloud-agent/service/api/http

      - name: Generator
        working-directory: cloud-agent/client/generator
        run: |
          yarn install
          yarn generate:all

      # The npm publish step uses Trusted Publisher via OIDC
      - name: Publish clients (npm Trusted Publisher)
        working-directory: cloud-agent/client/generator
        env:
          VERSION_TAG: ${{ inputs.revision }}
          PUBLISH_KOTLIN: ${{ inputs.kotlin }}
          PUBLISH_TS: ${{ inputs.ts }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.HYP_BOT_GPG_PRIVATE }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.HYP_BOT_GPG_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
        run: |
          echo "Using npm version $(npm -v)"
          npm audit signatures
          yarn publish:clients
